<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Registro · ASV MTY A.C.</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --asv-blue: #0072bc; --asv-navy: #004a7c; --success: #16a34a; --error: #dc2626;
      --bg: #f1f5f9; --white: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    header { width: 100%; background: linear-gradient(135deg, var(--asv-navy), var(--asv-blue)); padding: 25px 20px; text-align: center; color: white; }
    .card-event { background: var(--white); width: calc(100% - 30px); max-width: 450px; border-radius: 18px; padding: 20px; margin-top: -20px; box-shadow: 0 10px 25px rgba(0,114,188,0.1); display: flex; align-items: center; gap: 15px; }
    .form-container { width: 100%; max-width: 450px; padding: 30px 20px; }
    .input-label { font-family: 'Sora'; font-size: 10px; font-weight: 800; color: var(--asv-blue); text-transform: uppercase; margin-bottom: 8px; display: block; }
    .input-box { width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 16px; transition: 0.3s; }
    .input-box:focus { border-color: var(--asv-blue); }
    .input-box.error { border-color: var(--error); background: #fef2f2; }
    .btn-confirm { width: 100%; padding: 18px; border-radius: 14px; border: 2px solid var(--asv-blue); color: var(--asv-blue); background: transparent; font-family: 'Sora'; font-weight: 700; margin-top: 20px; cursor: pointer; transition: 0.3s; }
    .btn-confirm:active:not(:disabled) { background: var(--asv-blue); color: white; }
    .btn-confirm:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <div style="font-family:'Sora'; font-size:12px; font-weight:800;">ÁNGELES SIN VOZ MONTERREY A.C.</div>
  </header>
  
  <div class="card-event">
    <div id="ev-icon" style="font-size:24px;">🐾</div>
    <div style="flex:1">
      <div id="ev-name" style="font-weight:800; color:var(--asv-navy);">Cargando evento...</div>
      <div id="ev-date" style="font-size:11px; color:#64748b;">---</div>
    </div>
  </div>

  <div class="form-container" id="form-ui">
    <label class="input-label">Matrícula</label>
    <input type="text" class="input-box" id="inp-mat" placeholder="Ej. SS001" oninput="validateMatricula()">
    <p id="err-msg" style="color:var(--error); font-size:10px; margin-top:6px; display:none;">Matrícula no registrada para este evento.</p>
    
    <label class="input-label" style="margin-top:20px;">Nombre Completo</label>
    <div id="display-name" style="padding:16px; background:#e2e8f0; border-radius:14px; font-weight:600; color:var(--asv-navy);">Ingresa tu matrícula primero</div>
    
    <button class="btn-confirm" id="btn-submit" disabled onclick="processRegistration()">Confirmar Asistencia</button>
  </div>

  <div id="success-ui" style="display:none; padding:40px 20px; text-align:center;">
    <div style="font-size:60px; margin-bottom:20px;">✅</div>
    <h2 style="font-family:'Sora'; margin-bottom:10px;">¡Registro Exitoso!</h2>
    <p style="color:#64748b; font-size:14px;">Tu asistencia ha sido guardada. Toma captura de pantalla como comprobante.</p>
  </div>

  <script>
    // ─── LOGIC ───
    const API = 'https://asv-backend.onrender.com/api';
    let students = [], selectedStudent = null;
    const params = new URLSearchParams(window.location.search);
    const token = params.get('t');

    function validateMatricula() {
      const val = document.getElementById('inp-mat').value.trim().toUpperCase();
      const student = students.find(s => s.matricula === val);
      const btn = document.getElementById('btn-submit');
      const err = document.getElementById('err-msg');
      
      if(student) {
        selectedStudent = student;
        document.getElementById('display-name').textContent = student.nombre_completo;
        btn.disabled = false;
        err.style.display = 'none';
      } else {
        selectedStudent = null;
        document.getElementById('display-name').textContent = "Ingresa tu matrícula primero";
        btn.disabled = true;
        if(val.length >= 5) err.style.display = 'block';
      }
    }
  </script>
</body>
</html>
