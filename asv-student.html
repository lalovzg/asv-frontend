<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a6b">
<title>SS de ASV · Registro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --navy: #0f2a52; --blue: #1e6bb8; --sky: #2b9fd4; --light: #7ecef0; --white: #ffffff; --gray: #64748b; --border: #d1e3f8; --surface:#f0f6ff; --success:#16a34a; --error: #dc2626; --text: #111827; --bg: #f0f6ff; --card: #ffffff; --shadow: 0 4px 24px rgba(15,42,82,0.10); }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; align-items: center; padding-bottom: 40px; }
  .top-bar { width: 100%; background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%); padding: 20px 20px 28px; text-align: center; color: white; position: relative; }
  .top-title { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 800; margin-top: 8px; }
  .event-chip { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px 18px; margin: -16px 20px 0; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; width: calc(100% - 40px); max-width: 440px; z-index: 2; }
  .event-chip-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--navy), var(--blue)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .form-wrap { width: 100%; max-width: 440px; padding: 24px 20px 0; }
  .input-field { width: 100%; border: 1.5px solid var(--border); border-radius: 14px; padding: 14px; font-size: 16px; margin-bottom: 12px; outline: none; }
  .btn-confirm { width: 100%; background: linear-gradient(135deg, var(--blue), var(--sky)); color: white; border: none; border-radius: 14px; padding: 16px; font-family: 'Sora', sans-serif; font-weight: 700; cursor: pointer; }
  .btn-confirm:disabled { opacity: 0.4; }
  .success-screen, .error-screen { display: none; flex-direction: column; align-items: center; padding: 40px 20px; text-align: center; width: 100%; max-width: 440px; }
  .error-circle { width: 80px; height: 80px; border-radius: 50%; background: var(--error); color: white; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 20px; }
  .dropdown-field { width: 100%; border: 1.5px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 20px; cursor: pointer; background: white; display: flex; justify-content: space-between; }
  .dropdown-list { position: absolute; background: white; border: 1px solid var(--blue); border-radius: 14px; width: calc(100% - 40px); max-width: 400px; z-index: 50; display: none; max-height: 200px; overflow-y: auto; }
</style>
</head>
<body>
<div class="top-bar"><div class="top-title">Registro de Asistencia</div></div>
<div class="event-chip"><div class="event-chip-icon" id="evIcon">📥</div><div><div style="font-weight:700;" id="evName">Cargando...</div><div style="font-size:11px; color:var(--gray);" id="evMeta">---</div></div></div>
<div class="form-wrap" id="formSection">
  <input type="text" class="input-field" id="matricula" placeholder="Matrícula" oninput="onMatInput()">
  <div class="dropdown-field" id="nameDrop" onclick="toggleDD()"> <span id="dropText">Ingresa matrícula primero</span> <span>▼</span> </div>
  <div class="dropdown-list" id="dropList"></div>
  <button class="btn-confirm" id="btnConfirm" disabled onclick="confirmAttendance()">Confirmar</button>
</div>
<div class="success-screen" id="successScreen"> <div style="font-size:60px;">✅</div> <h2 id="sTitle">¡Registrado!</h2> <p id="sSub"></p> <button class="btn-confirm" style="margin-top:20px; background:var(--navy);" onclick="location.reload()">Cerrar / Otro</button> </div>
<div class="error-screen" id="errorScreen"> <div class="error-circle">✕</div> <h2 id="eTitle">Error</h2> <p id="eSub"></p> <button class="btn-confirm" style="margin-top:20px;" onclick="location.reload()">Reintentar</button> </div>
<script>
  const API = 'https://asv-backend.onrender.com/api';
  let students = [], selected = null, token = new URLSearchParams(location.search).get('t'), isOut = new URLSearchParams(location.search).get('mode')==='out';
  (async () => {
    if(!token) return showErr('Token ausente','Usa un QR válido');
    try {
      const res = await fetch(API+'/event/'+token), data = await res.json();
      if(!res.ok) return showErr('Acceso Denegado', data.error);
      students = data.estudiantes;
      document.getElementById('evName').textContent = data.evento.nombre;
      document.getElementById('evMeta').textContent = data.evento.fecha;
      if(isOut){
        document.getElementById('evIcon').textContent = '🏁';
        document.querySelector('.top-title').textContent = 'Registro de Salida';
        document.getElementById('btnConfirm').style.background = 'linear-gradient(135deg, #f59e0b, #d97706)';
      }
    } catch(e){ showErr('Error Red','Sin conexión'); }
  })();
  function onMatInput(){
    const val = document.getElementById('matricula').value.trim().toUpperCase();
    const match = students.find(s => s.matricula === val);
    if(match){ renderDD(match); document.getElementById('nameDrop').style.borderColor = 'var(--success)'; }
    else { document.getElementById('dropList').style.display='none'; document.getElementById('btnConfirm').disabled=true; }
  }
  function renderDD(m){
    const list = document.getElementById('dropList'); list.innerHTML = '';
    [m, ...students.filter(s=>s.id!==m.id)].forEach(s => {
      const d = document.createElement('div'); d.style.padding='12px'; d.textContent = s.nombre_completo;
      d.onclick = () => { selected = s; document.getElementById('dropText').textContent=s.nombre_completo; list.style.display='none'; document.getElementById('btnConfirm').disabled=false; };
      list.appendChild(d);
    });
  }
  function toggleDD(){ document.getElementById('dropList').style.display = document.getElementById('dropList').style.display==='block'?'none':'block'; }
  async function confirmAttendance(){
    document.getElementById('btnConfirm').disabled = true;
    try {
      const res = await fetch(API + (isOut?'/checkout':'/checkin'), { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, matricula:selected.matricula, estudiante_id:selected.id}) });
      const data = await res.json();
      if(!res.ok) return showErr('Atención', data.error);
      document.getElementById('formSection').style.display='none';
      document.getElementById('successScreen').style.display='flex';
      document.getElementById('sSub').textContent = isOut ? `Salida: ${data.asistencia.horas_reales}h cumplidas.` : `Entrada confirmada para ${data.asistencia.evento}`;
    } catch(e){ showErr('Error','Fallo en el servidor'); }
  }
  function showErr(t,s){ document.getElementById('formSection').style.display='none'; document.getElementById('errorScreen').style.display='flex'; document.getElementById('eTitle').textContent=t; document.getElementById('eSub').textContent=s; }
</script>
</body>
</html>
