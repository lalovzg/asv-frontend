<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SS ASV - Directora</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root { --navy:#0f2a52; --blue:#1e6bb8; --sky:#2b9fd4; --light:#7ecef0; --white:#fff; --gray:#64748b; --border:#d1e3f8; --success:#16a34a; --error:#dc2626; --bg:#f0f6ff; --card:#fff; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--navy); padding-bottom: 80px; }
  header { background: linear-gradient(135deg, var(--navy), var(--blue)); padding: 20px; color: white; }
  main { padding: 20px; max-width: 500px; margin: 0 auto; }
  .view { display: none; } .view.active { display: block; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card { background: white; padding: 15px; border-radius: 16px; text-align: center; border: 1px solid var(--border); }
  .stat-num { font-family: 'Sora'; font-size: 24px; font-weight: 800; }
  .qr-card { background: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; border: 1px solid var(--border); }
  .qr-frame { width: 180px; height: 180px; margin: 0 auto 15px; background: white; display: flex; align-items: center; justify-content: center; }
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
  .btn { border: none; border-radius: 12px; padding: 14px; color: white; font-weight: 700; cursor: pointer; transition: 0.2s; opacity: 0.4; }
  .btn-in { background: var(--blue); } .btn-out { background: #f59e0b; }
  .log-card { background: white; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
  .tab-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid var(--border); }
  .tab-item { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: var(--gray); font-weight: 600; }
  .tab-item.active { color: var(--blue); border-top: 3px solid var(--blue); }
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--navy); color: white; padding: 10px 20px; border-radius: 10px; opacity: 0; transition: 0.3s; }
</style>
</head>
<body>
<header> <div style="font-weight:800; font-size:14px; color:var(--light);">SS ÁNGELES SIN VOZ</div> <div id="hName" style="font-family:'Sora'; margin-top:5px;">Selecciona un evento</div> </header>
<main>
  <div class="view active" id="v-live">
    <div class="stats">
      <div class="stat-card"> <div class="stat-num" id="sTotal">0</div> <div style="font-size:10px;">Inscritos</div> </div>
      <div class="stat-card"> <div class="stat-num" style="color:var(--success);" id="sIn">0</div> <div style="font-size:10px;">En Brigada</div> </div>
      <div class="stat-card"> <div class="stat-num" style="color:var(--error);" id="sPending">0</div> <div style="font-size:10px;">Pendientes</div> </div>
    </div>
    <div class="qr-card">
      <div class="qr-frame" id="qrcode"></div>
      <div class="btn-grid">
        <button class="btn btn-in" id="bIn" onclick="genQR('in')">📥 Entrada</button>
        <button class="btn btn-out" id="bOut" onclick="genQR('out')">📤 Salida</button>
      </div>
      <button class="btn" id="bPause" onclick="togglePause()" style="width:100%; background:var(--error);">⏸ Pausar</button>
    </div>
    <div id="feed" class="log-card"></div>
  </div>
  <div class="view" id="v-monitor">
    <div class="log-card" id="monitorTable"></div>
  </div>
</main>
<nav class="tab-nav">
  <div class="tab-item active" onclick="switchTab('live', this)">📷 En Vivo</div>
  <div class="tab-item" onclick="switchTab('monitor', this)">📊 Sesiones</div>
</nav>
<div class="toast" id="toast"></div>

<script>
  const API = 'https://asv-backend.onrender.com/api', FRONT = 'https://lalovzg.github.io/asv-frontend/asv-student.html';
  let curId = null, curEv = null, total = 0, paused = false;

  async function loadEvs(){
    const res = await fetch(API+'/eventos'), d = await res.json();
    if(d.eventos.length) selectEv(d.eventos[0]); 
  }
  function selectEv(ev){
    curId = ev.id; curEv = ev; paused = ev.pausado;
    document.getElementById('hName').textContent = ev.nombre;
    ['bIn','bOut','bPause'].forEach(id => document.getElementById(id).style.opacity='1');
    fetch(API+'/event-stats/'+ev.id).then(r=>r.json()).then(d=>{ total=d.total; document.getElementById('sTotal').textContent=total; });
    genQR('in'); refresh(); setInterval(refresh, 10000);
  }
  async function genQR(mode){
    const res = await fetch(API+'/token/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({evento_id:curId})});
    const d = await res.json();
    const qrDiv = document.getElementById('qrcode'); qrDiv.innerHTML = '';
    new QRCode(qrDiv, { text: FRONT+'?t='+d.token+(mode==='out'?'&mode=out':''), width:170, height:170, colorDark:mode==='out'?'#d97706':'#0f2a52' });
    showToast('QR '+mode.toUpperCase()+' Generado');
  }
  async function refresh(){
    if(!curId) return;
    const res = await fetch(API+'/asistencias/'+curId), d = await res.json();
    renderFeed(d.asistencias); renderMonitor(d.asistencias);
    const inB = d.asistencias.filter(a=>!a.timestamp_salida).length;
    document.getElementById('sIn').textContent = inB;
    document.getElementById('sPending').textContent = total - d.asistencias.length;
  }
  function renderFeed(asis){
    const div = document.getElementById('feed'); div.innerHTML = '<div style="padding:10px; font-weight:800; font-size:12px; border-bottom:1px solid #eee;">ENTRADAS RECIENTES</div>';
    asis.slice().reverse().forEach(a => {
      const row = document.createElement('div'); row.style.padding='12px'; row.style.borderBottom='1px solid #eee'; row.style.display='flex'; row.style.justifyContent='space-between';
      row.innerHTML = `<span><b>${a.estudiantes.nombre_completo.split(' ')[0]}</b></span> <span style="color:var(--gray); font-size:12px;">${new Date(a.timestamp_servidor).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} ✅</span>`;
      div.appendChild(row);
    });
  }
  function renderMonitor(asis){
    const div = document.getElementById('monitorTable'); div.innerHTML = '<div style="display:grid; grid-template-columns:1.2fr 0.8fr 0.8fr 0.7fr 0.5fr; padding:10px; background:#f8f9fa; font-weight:800; font-size:10px;"><div>ALUMNO</div><div>IN</div><div>OUT</div><div>TIEMPO</div><div>ACC</div></div>';
    asis.forEach(a => {
      const now = new Date(), start = new Date(a.timestamp_servidor), meta = curEv.horas_acredita;
      let out = a.timestamp_salida ? new Date(a.timestamp_salida).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '--:--';
      let hrs = a.timestamp_salida ? a.horas_reales : parseFloat(((now - start)/(1000*60*60)).toFixed(2));
      let color = a.timestamp_salida ? (hrs>=meta?'var(--success)':'var(--error)') : (hrs>=meta?'#f59e0b':'var(--gray)');
      let emoji = a.timestamp_salida ? (hrs>=meta?'✅':'⚠️') : (hrs>=meta?'🕒':'⏳');
      const row = document.createElement('div'); row.style.display='grid'; row.style.gridTemplateColumns='1.2fr 0.8fr 0.8fr 0.7fr 0.5fr'; row.style.padding='10px'; row.style.borderBottom='1px solid #eee'; row.style.fontSize='12px'; row.style.alignItems='center';
      row.innerHTML = `<div>${a.estudiantes.nombre_completo.split(' ')[0]}</div> <div>${start.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div> <div>${out}</div> <div style="color:${color}; font-weight:800;">${emoji} ${hrs}h</div> <div>${!a.timestamp_salida?`<button onclick="forceOut('${a.id}','${a.estudiantes.nombre_completo}')" style="border:none; background:none; cursor:pointer; font-size:16px;">🚪</button>`:'✨'}</div>`;
      div.appendChild(row);
    });
  }
  async function forceOut(id, name){ if(!confirm('¿Cerrar sesión de '+name+'?')) return; await fetch(API+'/checkout-manual',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({asistencia_id:id})}); refresh(); }
  function switchTab(t, el){ document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById('v-'+t).classList.add('active'); document.querySelectorAll('.tab-item').forEach(i=>i.classList.remove('active')); el.classList.add('active'); }
  function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2000); }
  loadEvs();
</script>
</body>
</html>
